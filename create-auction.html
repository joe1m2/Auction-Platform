<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Auction - BidHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">
                <i class="fas fa-gavel"></i>
                <span>BidHub</span>
            </a>
            <button class="mobile-toggle"><i class="fas fa-bars"></i></button>
        </nav>
    </header>

    <div id="toast-container" class="toast-container"></div>

    <section class="auth-section">
        <div class="auth-card" style="max-width:560px;">
            <h2>Create New Auction</h2>
            <p class="subtitle">List your item and start receiving bids</p>
            <form id="create-auction-form" novalidate>
                <div class="form-group">
                    <label for="title">Auction Title</label>
                    <input type="text" id="title" placeholder="e.g., Vintage Rolex Submariner" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" placeholder="Describe your item in detail including condition, history, and any relevant information..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required></select>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
                    <div class="form-group">
                        <label for="starting-price">Starting Price ($)</label>
                        <input type="number" id="starting-price" placeholder="49.99" min="0.01" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="reserve-price">Reserve Price ($)</label>
                        <input type="number" id="reserve-price" placeholder="Optional" min="0" step="0.01">
                    </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
                    <div class="form-group">
                        <label for="min-increment">Min Bid Increment ($)</label>
                        <input type="number" id="min-increment" placeholder="10" min="1" step="1" value="10">
                    </div>
                    <div class="form-group">
                        <label for="duration">Duration (hours)</label>
                        <select id="duration">
                            <option value="24">24 Hours</option>
                            <option value="48">48 Hours</option>
                            <option value="72" selected>3 Days</option>
                            <option value="168">7 Days</option>
                            <option value="336">14 Days</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-auth">
                    <i class="fas fa-rocket"></i> List Auction
                </button>
            </form>
        </div>
    </section>

    <script src="js/app.js"></script>
</body>
</html>

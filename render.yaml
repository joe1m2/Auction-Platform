services:
  - type: web
    name: bidhub-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: auction-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1
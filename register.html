<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - BidHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">
                <i class="fas fa-gavel"></i>
                <span>BidHub</span>
            </a>
            <button class="mobile-toggle"><i class="fas fa-bars"></i></button>
        </nav>
    </header>

    <div id="toast-container" class="toast-container"></div>

    <section class="auth-section">
        <div class="auth-card">
            <h2>Create Account</h2>
            <p class="subtitle">Join BidHub and start bidding on amazing items</p>
            <form id="register-form" novalidate>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                    <span class="error-text">Name must be at least 2 characters</span>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                    <span class="error-text">Please enter a valid email</span>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password (min 6 characters)" required>
                    <span class="error-text">Password must be at least 6 characters</span>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm your password" required>
                    <span class="error-text">Passwords do not match</span>
                </div>
                <div style="margin-bottom:20px;font-size:0.85rem;color:var(--gray-500);">
                    <label style="display:flex;align-items:center;gap:8px;">
                        <input type="checkbox" required> I agree to the <a href="#" style="color:var(--primary);">Terms of Service</a> and <a href="#" style="color:var(--primary);">Privacy Policy</a>
                    </label>
                </div>
                <button type="submit" class="btn-auth">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </section>

    <script src="js/app.js"></script>
</body>
</html>
